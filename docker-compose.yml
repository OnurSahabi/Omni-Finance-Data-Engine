services:
  postgres:
    image: postgres:15
    container_name: fintek-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: finance
      POSTGRES_PASSWORD: finance123
      POSTGRES_DB: fintek_db
      POSTGRES_MAX_CONNECTIONS: 100
    ports:
      - "5432:5432"
    deploy:
      resources:
        limits:
          memory: 2g
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance -d fintek_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ./pgdata:/var/lib/postgresql/data

  # Spark Master
  spark-master:
    image: public.ecr.aws/bitnami/spark:4.1
    container_name: spark-master
    restart: no
    environment:
      - SPARK_MODE=master
    ports:
      - "8081:8080"
      - "7077:7077"

  # Spark Worker
  spark-worker:
    image: public.ecr.aws/bitnami/spark:4.1
    container_name: spark-worker
    restart: no
    depends_on:
      postgres:
        condition: service_healthy
      spark-master:
        condition: service_started
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=4G
      - SPARK_WORKER_CORES=2
      - SPARK_DRIVER_MEMORY=1G
    ports:
      - "8082:8081"
